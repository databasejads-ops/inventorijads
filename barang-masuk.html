<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barang Masuk</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Inventori Gudang</div>
    <nav class="nav">
      <a href="index.html">Dashboard</a>
      <a class="active" href="barang-masuk.html">Barang Masuk</a>
      <a href="proses-pesanan.html">Proses Pesanan</a>
      <a href="stok-realtime.html">Stok Realtime</a>
    </nav>
  </aside>

  <main class="main">
    <header class="page-header">
      <div>
        <h1>Barang Masuk</h1>
        <p>Contoh kolom mengikuti sheet Barang Masuk.</p>
      </div>
    </header>

    <section class="card">
      <form id="formMasuk">
        <div class="form-grid">
          <div class="form-group">
            <label>Tanggal</label>
            <input type="date" id="tanggal" required>
          </div>
          <div class="form-group">
            <label>SKU Barang</label>
            <input type="text" id="sku" placeholder="Contoh: 1400PTGETRA" required>
          </div>
          <div class="form-group">
            <label>Lokasi</label>
            <select id="lokasi" required>
              <option value="59">59</option>
              <option value="61">61</option>
              <option value="92">92</option>
              <option value="RSA">RSA</option>
              <option value="Fomac">Fomac</option>
              <option value="Crown">Crown</option>
              <option value="Sinmag">Sinmag</option>
            </select>
          </div>
          <div class="form-group">
            <label>Milik</label>
            <select id="milik" required>
              <option value="JA">JA</option>
              <option value="DS">DS</option>
            </select>
          </div>
          <div class="form-group">
            <label>Jumlah</label>
            <input type="number" id="jumlah" min="1" required>
          </div>
          <div class="form-group">
            <label>Catatan</label>
            <input type="text" id="catatan" placeholder="Opsional">
          </div>
        </div>
        <div class="actions">
          <button class="btn-primary" type="submit">Simpan Barang Masuk</button>
          <button class="btn-secondary" type="button" id="resetMasuk">Reset Contoh</button>
        </div>
        <div id="noticeMasuk" class="notice"></div>
      </form>
    </section>

    <section class="card table-card">
      <h2>Data Barang Masuk</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>No.</th>
              <th>Tanggal</th>
              <th>SKU Barang</th>
              <th>Lokasi</th>
              <th>Milik</th>
              <th>Jumlah</th>
              <th>Catatan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tbodyMasuk"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script src="app.js"></script>
<script>
  let dataMasuk = readData(KEYS.masuk, sampleMasuk);
  document.getElementById("tanggal").value = new Date().toISOString().slice(0,10);

  function renderMasuk() {
    const tbody = document.getElementById("tbodyMasuk");
    if (!dataMasuk.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">Belum ada data.</td></tr>';
      return;
    }
    tbody.innerHTML = dataMasuk.map((x,i) => `
      <tr>
        <td>${i+1}</td>
        <td>${formatDate(x.tanggal)}</td>
        <td>${esc(x.sku)}</td>
        <td><span class="badge blue">${esc(x.lokasi)}</span></td>
        <td><span class="badge red">${esc(x.milik)}</span></td>
        <td>${Number(x.jumlah)}</td>
        <td>${esc(x.catatan || "-")}</td>
        <td><button class="btn-danger" onclick="hapusMasuk('${x.id}')">Hapus</button></td>
      </tr>
    `).join("");
  }

  document.getElementById("formMasuk").addEventListener("submit", e => {
    e.preventDefault();
    dataMasuk.push({
      id: uid(),
      tanggal: document.getElementById("tanggal").value,
      sku: document.getElementById("sku").value.trim(),
      lokasi: document.getElementById("lokasi").value,
      milik: document.getElementById("milik").value,
      jumlah: Number(document.getElementById("jumlah").value),
      catatan: document.getElementById("catatan").value.trim()
    });
    saveData(KEYS.masuk, dataMasuk);
    e.target.reset();
    document.getElementById("tanggal").value = new Date().toISOString().slice(0,10);
    renderMasuk();
    setNotice("noticeMasuk", "Data barang masuk berhasil disimpan.");
  });

  function hapusMasuk(id) {
    if (!confirm("Hapus data ini?")) return;
    dataMasuk = dataMasuk.filter(x => x.id !== id);
    saveData(KEYS.masuk, dataMasuk);
    renderMasuk();
  }

  document.getElementById("resetMasuk").addEventListener("click", () => {
    if (!confirm("Kembalikan data contoh?")) return;
    dataMasuk = [...sampleMasuk];
    saveData(KEYS.masuk, dataMasuk);
    renderMasuk();
  });

  renderMasuk();
</script>
</body>
</html>
